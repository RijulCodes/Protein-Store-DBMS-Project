version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fitfuel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql123
      MYSQL_DATABASE: protein_store
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: fitfuel_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=mysql123
      - DB_NAME=protein_store
      - JWT_SECRET=supersecretjwtkey123!
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: fitfuel_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
